<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AI题库">
<meta name="theme-color" content="#f2f3f5">
<meta property="og:title" content="AI 题库 · 多功能刷题">
<meta property="og:description" content="405道AI/编程练习题，单选+判断，随时刷题">
<meta property="og:type" content="website">
<title>AI 题库 · 多功能刷题</title>
<style>
:root{--bg:#f2f3f5;--card2:#fff;--border:rgba(0,0,0,.06);--text:#1a1a1c;--muted:#8e8e93;--accent:#0071e3;--green:#34c759;--red:#ff3b30;--gold:#ff9500;--shadow:0 2px 12px rgba(0,0,0,.06);--radius:18px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,113,227,.06)0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(52,199,89,.05)0%,transparent 70%);pointer-events:none;z-index:0}
.topbar{position:sticky;top:0;z-index:100;background:rgba(242,243,245,.72);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.topbar h1{font-size:22px;font-weight:720;letter-spacing:-.3px;color:#1a1a1c}
.tabs{display:flex;gap:2px;background:rgba(0,0,0,.04);border-radius:10px;padding:3px}
.tab{border:none;background:none;color:var(--muted);cursor:pointer;font-size:13px;font-weight:560;padding:7px 16px;border-radius:8px;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{background:var(--card2);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.share-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card2);color:var(--text);cursor:pointer;font-size:13px;font-weight:560;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px}
.share-btn:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(0,113,227,.12)}
.tab .badge{font-size:10px;background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;margin-left:4px;font-weight:600;display:none;vertical-align:middle}
.stats-bar{display:flex;gap:8px;font-size:12px;flex-wrap:wrap}
.stats-bar span{padding:5px 12px;border-radius:20px;font-weight:560;font-size:11px}
.s-total{background:rgba(0,113,227,.08);color:var(--accent)}.s-right{background:rgba(52,199,89,.1);color:#1b7a35}.s-wrong{background:rgba(255,59,48,.08);color:var(--red)}
.main{max-width:900px;margin:0 auto;padding:20px 20px 60px;position:relative;z-index:1}
.panel{display:none}.panel.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar select,.toolbar button,.toolbar input{padding:8px 16px;border-radius:22px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:13px;cursor:pointer;font-weight:500;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.toolbar button:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(0,113,227,.12)}
.toolbar .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}.toolbar .btn-primary:hover{opacity:.9;box-shadow:0 4px 16px rgba(0,113,227,.24)}
.jump{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-left:auto}
.jump input{width:44px;text-align:center}
.card{background:var(--card2);border-radius:var(--radius);padding:24px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card .q-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.q-tag{font-size:11px;padding:4px 12px;border-radius:20px;background:rgba(0,113,227,.07);color:var(--accent);font-weight:560}
.q-num{font-size:12px;color:var(--muted);font-weight:500}
.q-text{font-size:16px;line-height:1.65;margin-bottom:18px;font-weight:480;letter-spacing:.1px}
.option{display:flex;align-items:center;padding:14px 18px;border-radius:14px;border:2px solid var(--border);cursor:pointer;transition:all .18s;margin-bottom:8px;font-size:14px;background:rgba(0,0,0,.01)}
.option:hover{border-color:var(--accent);background:rgba(0,113,227,.03);transform:translateX(2px)}
.option .dot{min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(0,0,0,.05);font-weight:680;margin-right:14px;font-size:13px;transition:all .18s}
.option.sel{border-color:var(--accent);background:rgba(0,113,227,.06)}.option.sel .dot{background:var(--accent);color:#fff}
.option.ok{border-color:var(--green)!important;background:rgba(52,199,89,.08)!important}.option.ok .dot{background:var(--green);color:#fff}
.option.er{border-color:var(--red)!important;background:rgba(255,59,48,.06)!important}.option.er .dot{background:var(--red);color:#fff}
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.tf-btn{padding:20px;text-align:center;border-radius:14px;border:2px solid var(--border);cursor:pointer;font-size:16px;font-weight:620;background:rgba(0,0,0,.01);transition:all .18s}
.tf-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.tf-btn.sel{border-color:var(--accent);background:rgba(0,113,227,.06)}.tf-btn.ok{border-color:var(--green)!important;background:rgba(52,199,89,.08)!important;color:#1b7a35}
.tf-btn.er{border-color:var(--red)!important;background:rgba(255,59,48,.06)!important;color:var(--red)}
.feedback{padding:12px 18px;border-radius:12px;margin-top:12px;font-weight:560;font-size:14px;display:none}
.feedback.show{display:block}.feedback.ok{background:rgba(52,199,89,.08);color:#1b7a35}.feedback.er{background:rgba(255,59,48,.06);color:var(--red)}
.nav-row{display:flex;justify-content:space-between;gap:12px;margin-top:16px}
.nav-row button{padding:12px 28px;border-radius:22px;border:none;font-weight:600;cursor:pointer;font-size:14px;transition:all .2s}
.btn-prev{background:rgba(0,0,0,.05);color:var(--text)}.btn-prev:hover{background:rgba(0,0,0,.1)}
.btn-next{background:var(--accent);color:#fff}.btn-next:hover{opacity:.9;box-shadow:0 4px 16px rgba(0,113,227,.24)}
.exam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.exam-card{background:var(--card2);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.exam-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1);border-color:var(--accent)}
.exam-card h3{font-size:16px;margin-bottom:6px;font-weight:620}.exam-card .meta{font-size:12px;color:var(--muted)}.exam-card .meta span{margin-right:12px}
.exam-card .bar{height:5px;background:rgba(0,0,0,.05);border-radius:10px;margin-top:12px;overflow:hidden}
.exam-card .bar div{height:100%;background:var(--accent);border-radius:10px;transition:width .4s}
.setup-card{background:var(--card2);border-radius:var(--radius);padding:36px;box-shadow:var(--shadow);text-align:center;max-width:520px;margin:32px auto;border:1px solid var(--border)}
.setup-card h2{font-size:28px;font-weight:720;letter-spacing:-.3px;margin-bottom:8px}
.setup-card p{color:var(--muted);margin-bottom:24px;font-size:15px}
.setup-row{display:flex;gap:18px;justify-content:center;margin-bottom:24px}
.setup-row label{font-size:13px;color:var(--muted);font-weight:500}
.setup-row input{width:68px;padding:10px;border-radius:14px;border:2px solid var(--border);background:rgba(0,0,0,.02);text-align:center;font-size:18px;font-weight:600}
.result-card{background:var(--card2);border-radius:var(--radius);padding:40px;box-shadow:var(--shadow);text-align:center;border:1px solid var(--border)}
.result-card h2{font-size:22px;font-weight:700;margin-bottom:16px}
.score-circle{width:160px;height:160px;border-radius:50%;margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:6px solid var(--accent);background:rgba(0,113,227,.03)}
.score-circle .big{font-size:40px;font-weight:780;color:var(--accent);letter-spacing:-1px}
.score-circle .sub{font-size:13px;color:var(--muted)}
.score-detail{display:flex;justify-content:center;gap:24px;margin-bottom:20px;flex-wrap:wrap}
.score-detail .item{padding:12px 20px;border-radius:14px;background:rgba(0,0,0,.03)}
.score-detail .item .val{font-size:24px;font-weight:700}.score-detail .item .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.wrong-item{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--card2);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;gap:12px;box-shadow:0 1px 2px rgba(0,0,0,.02)}
.wrong-item .info{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wrong-item .info .q-text{font-size:13px;margin:0}.wrong-item .info .meta{font-size:11px;color:var(--muted)}
.wrong-item button{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-size:12px;transition:all .15s;white-space:nowrap}
.wrong-item button:hover{border-color:var(--red);color:var(--red)}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card2);border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.15);max-width:600px;width:92%;max-height:76vh;overflow-y:auto}
.modal h3{font-size:18px;font-weight:680;margin-bottom:14px}
.add-search{width:100%;padding:10px 16px;border-radius:14px;border:2px solid var(--border);background:rgba(0,0,0,.02);font-size:14px;margin-bottom:10px}
.add-list{max-height:340px;overflow-y:auto;border-radius:14px;border:1px solid var(--border)}
.add-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;gap:10px;border-bottom:none;min-height:0}
.add-item+.add-item{border-top:1px solid var(--border)}
.add-item button{padding:5px 14px;border-radius:20px;border:1px solid var(--green);background:none;color:var(--green);cursor:pointer;font-size:11px;font-weight:600}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px}
.timer-bar{display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--card2);border-radius:14px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid var(--border);justify-content:space-between}
.timer-bar .time{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px}
.timer-bar .time.warn{color:var(--red);animation:pulse .6s infinite}
.timer-bar .label{font-size:12px;color:var(--muted)}
.timer-bar .max-score{font-size:13px;color:var(--accent);font-weight:600}
@keyframes pulse{50%{opacity:.5}}
@media(max-width:768px){
  .topbar{padding:8px 10px;gap:6px;flex-wrap:wrap}
  .topbar h1{font-size:17px}
  .share-btn{padding:6px 10px;font-size:11px;order:1}
  .tabs{order:3;width:100%;overflow-x:auto;gap:1px;padding:2px;-webkit-overflow-scrolling:touch}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:7px 11px;font-size:11px;flex-shrink:0}
  .stats-bar{order:2}
  .main{padding:10px 10px 50px}
  .card{padding:16px}
  .q-text{font-size:15px;line-height:1.6}
  .option{padding:12px 14px;font-size:13px;min-height:48px;display:flex;align-items:center}
  .option .dot{min-width:32px;height:32px;font-size:12px}
  .exam-grid{grid-template-columns:1fr}
  .tf-row{grid-template-columns:1fr}
  .tf-btn{padding:16px;font-size:15px;min-height:48px}
  .setup-card{padding:22px 16px;margin:16px 0}
  .setup-card h2{font-size:22px}
  .score-circle{width:110px;height:110px}
  .score-circle .big{font-size:28px}
  .timer-bar{padding:8px 14px;flex-wrap:wrap;gap:4px}
  .timer-bar .time{font-size:16px}
  .timer-bar .label{font-size:11px}
  .toolbar{flex-wrap:wrap;gap:6px}
  .toolbar select,.toolbar button,.toolbar input{padding:8px 12px;font-size:12px;min-height:36px}
  .jump{margin-left:0;width:100%;justify-content:flex-end}
  .nav-row button{padding:12px 22px;font-size:13px;min-height:44px}
  .nav-row{gap:8px}
  .modal{width:95%;max-height:85vh;padding:16px;border-radius:16px}
  .wrong-item{flex-wrap:wrap;gap:8px}
  .wrong-item .info{flex:1 1 100%}
  .result-card{padding:24px 16px}
  .score-detail{gap:12px}
  .score-detail .item{padding:10px 14px}
  .score-detail .item .val{font-size:20px}
  .setup-row{flex-direction:column;align-items:center;gap:12px}
  .btn-prev,.btn-next{min-width:80px;text-align:center}
}

@media(max-width:400px){
  .topbar h1{font-size:15px}
  .tab{padding:6px 8px;font-size:10px}
  .card{padding:14px}
  .q-text{font-size:14px}
  .option{padding:10px 12px;font-size:12px;min-height:44px}
  .option .dot{min-width:28px;height:28px;font-size:11px;margin-right:10px}
  .tf-btn{padding:14px;font-size:14px}
  .score-circle{width:90px;height:90px}
  .score-circle .big{font-size:24px}
  .setup-card h2{font-size:20px}
  .btn-prev,.btn-next{padding:10px 16px;font-size:12px;min-height:40px}
}
</style>
</head>
<body>

<div class="topbar">
<h1>🧠 AI 题库</h1>
<button class="share-btn" onclick="sharePage()" title="分享">📤 分享</button>
<div class="tabs" id="tabs">
<button class="tab active" data-panel="panel-type">📂 题型</button>
<button class="tab" data-panel="panel-exam">📋 套卷</button>
<button class="tab" data-panel="panel-random">🎲 组卷</button>
<button class="tab" data-panel="panel-wrong">📝 错题本<span class="badge" id="wbBadge"></span></button>
</div>
<div class="stats-bar"><span class="s-total" id="sTotal"></span><span class="s-right" id="sRight"></span><span class="s-wrong" id="sWrong"></span></div>
</div>

<div class="main">
<div class="panel active" id="panel-type">
<div class="toolbar">
<select id="typeFilter"><option value="all">全部</option><option value="sc">单选题</option><option value="tf">判断题</option></select>
<select id="catFilter"><option value="all">全部分类</option></select>
<button onclick="typeRandom()" style="font-weight:500">🎲 随机</button>
<button onclick="typeReset()" style="font-weight:500">🔄 重置</button>
<button id="btnBrowse" onclick="toggleBrowse()" style="font-weight:500">📖 浏览</button>
<div class="jump" id="jumpQuiz"><span>跳转</span><input id="typeJump" type="number" min="1"><span id="typeTotal">/ 1</span></div>
</div>
<div id="typeQuestion"></div>
</div>
<div class="panel" id="panel-exam"><div class="exam-grid" id="examGrid"></div></div>
<div class="panel" id="panel-random"><div id="randomSetup"></div><div id="randomQuiz" style="display:none"></div></div>
<div class="panel" id="panel-wrong">
<div class="toolbar">
<button class="btn-primary" onclick="wbStartPractice()">▶ 刷错题</button>
<button onclick="wbShowAdd()">➕ 添加</button>
<button onclick="wbClear()">🗑 清空</button>
<span style="font-size:13px;color:var(--muted)" id="wbCount"></span>
</div>
<div id="wbList"></div><div id="wbPractice" style="display:none"></div>
</div>
</div>

function buildSets(){
  const su=SC_DATA.map(q=>'s'+q[0]),tu=TF_DATA.map(q=>'t'+q[0]);
  const sets=[];const sp=Math.ceil(su.length/10),tp=Math.ceil(tu.length/10);
  sets.push({name:'第 1 套',qs:[...su.slice(0,27),...tu.slice(0,20)]});
  for(let i=1;i<10;i++){let s=su.slice(27+(i-1)*sp,27+i*sp),t=tu.slice(20+(i-1)*tp,20+i*tp);if(s.length<15)s=[...s,...su.slice(0,15-s.length)];if(t.length<10)t=[...t,...tu.slice(0,10-t.length)];sets.push({name:`第 ${i+1} 套`,qs:[...s,...t].sort(()=>Math.random()-.5)});}
  return sets;
}
const EXAM_SETS=buildSets();

const LS=localStorage;
function getWB(){try{return new Set(JSON.parse(LS.getItem('aiwb')||'[]'))}catch(e){return new Set()}}
function saveWB(wb){LS.setItem('aiwb',JSON.stringify([...wb]))}
function getAns(){try{return JSON.parse(LS.getItem('aians')||'{}')}catch(e){return{}}}
function saveAns(a){LS.setItem('aians',JSON.stringify(a))}
let wrongBook=getWB(),allAnswers=getAns();
function getQ(uid){return Q.find(q=>q.uid===uid)}

function updateStats(){
  const b=byId('wbBadge');const n=wrongBook.size;b.textContent=n||'';b.style.display=n?'inline':'none';
  let r=0,w=0;Object.entries(allAnswers).forEach(([uid,ans])=>{const q=getQ(uid);if(!q||ans===-1)return;if(ans===q.ans)r++;else w++});
  byId('sTotal').textContent=`${Q.length}题`;byId('sRight').textContent=`✅${r}`;byId('sWrong').textContent=`❌${w}`;
}

document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');byId(tab.dataset.panel).classList.add('active');const p=tab.dataset.panel;if(p==='panel-type')renderTM();else if(p==='panel-exam')renderEG();else if(p==='panel-random')renderRS();else if(p==='panel-wrong')renderWB();updateStats();});});

function qCard(q,idx,total){
  const u=allAnswers[q.uid],answered=u!==undefined&&u!==-1,revealed=u===-1,ok=answered&&u===q.ans;
  let h=`<div class="card"><div class="q-head"><span class="q-num">${idx+1}/${total}</span><span class="q-tag">${q.cat}</span></div><div class="q-text">${q.type==='sc'?'【单选】':'【判断】'} ${q.q}</div>`;
  if(q.type==='sc'){q.opts.forEach((o,i)=>{let c='option';if(answered||revealed){if(i===q.ans)c+=' ok';else if(i===u&&answered)c+=' er';}else if(u===i)c+=' sel';h+=`<div class="${c}" onclick="answer('${q.uid}',${i})"><span class="dot">${String.fromCharCode(65+i)}</span>${o}</div>`;});}
  else{h+=`<div class="tf-row">`;[true,false].forEach(v=>{let c='tf-btn';if(answered||revealed){if(q.ans===v)c+=' ok';else if(u===v&&answered)c+=' er';}else if(u===v)c+=' sel';h+=`<div class="${c}" onclick="answer('${q.uid}',${v})">${v?'✅ 正确':'❌ 错误'}</div>`;});h+=`</div>`;}
  if(revealed){h+=`<div class="feedback show ok">💡 已查看答案 · 正确答案：${q.type==='sc'?String.fromCharCode(65+q.ans):(q.ans?'正确':'错误')}</div>`}
  else if(answered){const cor=q.type==='sc'?String.fromCharCode(65+q.ans):(q.ans?'正确':'错误');h+=`<div class="feedback show ${ok?'ok':'er'}">${ok?'🎉 正确！':'😞 错误 · 正确答案：'+cor}</div>`}
  return h;
}
function answer(uid,val){if(allAnswers[uid]!==undefined)return;const q=getQ(uid);if(!q)return;allAnswers[uid]=val;saveAns(allAnswers);if(val!==q.ans){wrongBook.add(uid);saveWB(wrongBook)}updateStats();refreshCurrent();}
function refreshCurrent(){const ap=document.querySelector('.panel.active');if(!ap)return;if(ap.id==='panel-type'){if(tMode==='browse')renderBrowse();else renderTQ()}else if(ap.id==='panel-exam'&&curExam!==null)renderEQ();else if(ap.id==='panel-random'&&randQs.length>0)renderRQ();else if(ap.id==='panel-wrong'&&wbOn)renderWbQ();}

let tfilt='all',tCat='all',tIdx=0,tQs=[],tMode='quiz',tPage=1;
function renderTM(){const cats=new Set();Q.forEach(q=>cats.add(q.cat));const sel=byId('catFilter');sel.innerHTML='<option value="all">全部分类</option>';[...cats].sort().forEach(c=>sel.innerHTML+=`<option value="${c}">${c}</option>`);sel.value=tCat;byId('typeFilter').value=tfilt;applyTF();}
function applyTF(){tfilt=byId('typeFilter').value;tCat=byId('catFilter').value;tQs=Q.filter(q=>{if(tfilt==='sc'&&q.type!=='sc')return false;if(tfilt==='tf'&&q.type!=='tf')return false;if(tCat!=='all'&&q.cat!==tCat)return false;return true;});tIdx=Math.min(tIdx,Math.max(0,tQs.length-1));renderTQ();}
byId('typeFilter').addEventListener('change',applyTF);byId('catFilter').addEventListener('change',applyTF);

function toggleBrowse(){
  tMode=tMode==='quiz'?'browse':'quiz';
  byId('btnBrowse').textContent=tMode==='browse'?'🎯 刷题':'📖 浏览';
  byId('jumpQuiz').style.display=tMode==='browse'?'none':'flex';
  if(tMode==='browse'){tPage=1;renderBrowse()}else{renderTQ()}
}

function renderTQ(){
  if(tMode==='browse'){renderBrowse();return;}
  const a=byId('typeQuestion');byId('typeTotal').textContent=`/ ${tQs.length||1}`;byId('typeJump').max=tQs.length||1;byId('typeJump').value=tIdx+1;
  if(!tQs.length){a.innerHTML='<div class="empty-state">📭 无匹配题目</div>';return}
  const q=tQs[tIdx],u=allAnswers[q.uid],answered=u!==undefined;
  a.innerHTML=qCard(q,tIdx,tQs.length)+
    (!answered?`<div style="margin-top:12px"><button onclick="revealAnswer('${q.uid}')" style="padding:8px 18px;border-radius:20px;border:1px dashed var(--gold);background:rgba(255,149,0,.05);color:var(--gold);cursor:pointer;font-size:13px;font-weight:500">💡 查看答案</button></div>`:'')+
    `<div class="nav-row"><button class="btn-prev" onclick="tPrev()" ${tIdx===0?'disabled':''}>⬅ 上一题</button><button class="btn-next" onclick="tNext()" ${tIdx>=tQs.length-1?'disabled':''}>下一题 ➡</button></div>`;
}
function revealAnswer(uid){
  if(allAnswers[uid]!==undefined)return;
  allAnswers[uid]=-1; // revealed but not attempted
  saveAns(allAnswers);updateStats();renderTQ();
}
function tPrev(){if(tIdx>0){tIdx--;renderTQ()}}function tNext(){if(tIdx<tQs.length-1){tIdx++;renderTQ()}}function typeRandom(){tIdx=Math.floor(Math.random()*tQs.length);renderTQ()}
function typeReset(){if(!confirm('确定重置此分类答题记录？'))return;tQs.forEach(q=>{delete allAnswers[q.uid];wrongBook.delete(q.uid)});saveAns(allAnswers);saveWB(wrongBook);updateStats();renderTQ();}
byId('typeJump').addEventListener('change',function(){const v=parseInt(this.value);if(v>=1&&v<=tQs.length){tIdx=v-1;renderTQ()}});

// 浏览模式（分页翻看，答案可见）
function renderBrowse(){
  const perPage=25,totalPages=Math.ceil(tQs.length/perPage);
  if(tPage>totalPages)tPage=totalPages;if(tPage<1)tPage=1;
  const start=(tPage-1)*perPage,end=Math.min(start+perPage,tQs.length);
  const pageQs=tQs.slice(start,end);
  let h=browsePager(tPage,totalPages);
  h+=`<div style="font-size:12px;color:var(--muted);margin-bottom:10px">第 ${start+1}-${end} 题，共 ${tQs.length} 题</div>`;
  pageQs.forEach((q,i)=>{
    const idx=start+i,u=allAnswers[q.uid],answered=u!==undefined&&u!==-1,ok=answered&&u===q.ans,revealed=u===-1;
    let status='';
    if(answered&&ok)status='<span style="font-size:11px;color:var(--green);margin-left:8px">✅ 答对</span>';
    else if(answered&&!ok)status='<span style="font-size:11px;color:var(--red);margin-left:8px">❌ 答错</span>';
    else if(revealed)status='<span style="font-size:11px;color:var(--gold);margin-left:8px">💡 已查看</span>';
    else status='<span style="font-size:11px;color:var(--muted);margin-left:8px">未作答</span>';
    h+=`<div class="card" id="bq${idx}" style="padding:18px 22px"><div class="q-head"><span class="q-num">#${idx+1} · ${q.cat}</span>${status}</div><div class="q-text" style="font-size:14px">${q.type==='sc'?'【单选】':'【判断】'} ${q.q}</div>`;
    if(q.type==='sc'){
      q.opts.forEach((o,oi)=>{const isAns=oi===q.ans;h+=`<div class="option${isAns?' ok':''}" style="cursor:default;padding:10px 14px;margin-bottom:4px"><span class="dot">${String.fromCharCode(65+oi)}</span>${o}${isAns?' <b style="color:var(--green);margin-left:4px">← 答案</b>':''}</div>`});
    }else{
      h+=`<div class="tf-row">`;
      const tAns=q.ans===true;h+=`<div class="tf-btn${tAns?' ok':''}" style="cursor:default;padding:12px">✅ 正确${tAns?' ← 答案':''}</div>`;
      h+=`<div class="tf-btn${!tAns?' ok':''}" style="cursor:default;padding:12px">❌ 错误${!tAns?' ← 答案':''}</div></div>`;
    }
    h+=`</div>`;
  });
  h+=browsePager(tPage,totalPages);
  byId('typeQuestion').innerHTML=h;
  byId('typeTotal').textContent=`${tQs.length}题 · ${totalPages}页`;
  byId('typeQuestion').scrollIntoView({behavior:'smooth'});
}
function browsePager(p,total){
  let ph=`<div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px;flex-wrap:wrap">`;
  ph+=`<button onclick="tPage=1;renderBrowse()" ${p<=1?'disabled':''} style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:14px">⏮</button>`;
  ph+=`<button onclick="tPage--;renderBrowse()" ${p<=1?'disabled':''} style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:14px">◀</button>`;
  ph+=`<span style="font-size:14px;font-weight:600;min-width:70px;text-align:center">${p}/${total}</span>`;
  ph+=`<button onclick="tPage++;renderBrowse()" ${p>=total?'disabled':''} style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:14px">▶</button>`;
  ph+=`<button onclick="tPage=${total};renderBrowse()" ${p>=total?'disabled':''} style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:14px">⏭</button>`;
  ph+=`<span style="font-size:11px;color:var(--muted)">25题/页</span></div>`;
  return ph;
}

// ── 面板2：套卷 ──
let curExam=null,eIdx=0,eQs=[];
function renderEG(){const g=byId('examGrid');g.style.display='grid';let h='';EXAM_SETS.forEach((s,i)=>{const t=s.qs.length,done=s.qs.filter(u=>allAnswers[u]!==undefined).length,p=t>0?Math.round(done/t*100):0;h+=`<div class="exam-card" onclick="startE(${i})"><h3>📋 ${s.name}</h3><div class="meta"><span>📝 ${t}题</span><span>✅ ${done}</span></div><div class="bar"><div style="width:${p}%"></div></div></div>`;});g.innerHTML=h;}
function startE(i){curExam=i;eIdx=0;eQs=EXAM_SETS[i].qs.map(u=>getQ(u)).filter(Boolean);byId('examGrid').style.display='block';renderEQ();}
function renderEQ(){const a=byId('examGrid');if(!eQs.length){a.innerHTML='<div class="empty-state">📭 无题目</div>';return}a.innerHTML=qCard(eQs[eIdx],eIdx,eQs.length)+`<div class="nav-row"><button class="btn-prev" onclick="ePrev()" ${eIdx===0?'disabled':''}>⬅ 上一题</button><span style="font-size:12px;color:var(--muted);align-self:center">${EXAM_SETS[curExam].name}</span><button class="btn-next" onclick="eNext()" ${eIdx>=eQs.length-1?'disabled':''}>下一题 ➡</button></div><div style="text-align:center;margin-top:10px"><button onclick="curExam=null;renderEG()" style="border:none;background:none;color:var(--muted);cursor:pointer;font-size:12px">← 返回列表</button></div>`;}
function ePrev(){if(eIdx>0){eIdx--;renderEQ()}}function eNext(){if(eIdx<eQs.length-1){eIdx++;renderEQ()}}

// ── 面板3：随机组卷（含计时 & 满分显示） ──
let randQs=[],rIdx=0,rDone=false,rTimer=null,rSeconds=0,rMaxScore=0,rTimeUsed='';
function renderRS(){
  if(randQs.length===0||rDone){
    clearInterval(rTimer);rTimer=null;
    byId('randomQuiz').style.display='none';
    byId('randomSetup').innerHTML=`<div class="setup-card"><h2>🎲 随机组卷</h2><p>从题库随机抽取，模拟正式考试<br><span style="color:var(--muted);font-size:13px">单选 <b style="color:var(--accent)">2分/题</b> · 判断 <b style="color:var(--gold)">1分/题</b> · ⏱ 限时 <b style="color:#6366f1">30分钟</b></span></p><div class="setup-row"><label>单选题<br><input id="randSC" type="number" value="30" min="5" max="${SC_DATA.length}" onchange="updateRPreview()"></label><label>判断题<br><input id="randTF" type="number" value="20" min="5" max="${TF_DATA.length}" onchange="updateRPreview()"></label></div><p id="rPreview" style="font-size:14px;color:var(--accent);font-weight:600">满分：30×2 + 20×1 = <b>80分</b></p><button class="btn-primary" onclick="genRand()" style="padding:12px 36px;font-size:16px">🚀 开始组卷</button></div>`;
  }else{byId('randomSetup').innerHTML='';byId('randomQuiz').style.display='block';renderRQ();}
}
function updateRPreview(){
  const s=parseInt(byId('randSC').value)||30,t=parseInt(byId('randTF').value)||20;
  const el=byId('rPreview');if(el)el.innerHTML=`满分：${s}×2 + ${t}×1 = <b>${s*2+t}分</b>`;
}
function formatTime(sec){const m=Math.floor(sec/60),s=sec%60;return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
function genRand(){
  clearInterval(rTimer);
  const scN=Math.min(parseInt(byId('randSC').value)||30,SC_DATA.length);
  const tfN=Math.min(parseInt(byId('randTF').value)||20,TF_DATA.length);
  rMaxScore=scN*2+tfN*1;
  const sc=[...SC_DATA].sort(()=>Math.random()-.5).slice(0,scN);
  const tf=[...TF_DATA].sort(()=>Math.random()-.5).slice(0,tfN);
  randQs=[...sc.map(q=>'s'+q[0]),...tf.map(q=>'t'+q[0])].sort(()=>Math.random()-.5);
  rIdx=0;rDone=false;rSeconds=30*60; // 30 min
  randQs.forEach(u=>{delete allAnswers[u];wrongBook.delete(u)});
  saveAns(allAnswers);saveWB(wrongBook);updateStats();
  byId('randomSetup').innerHTML='';byId('randomQuiz').style.display='block';
  // start timer
  rTimer=setInterval(()=>{
    rSeconds--;
    const el=byId('rTimeDisplay');
    if(el){el.textContent=formatTime(rSeconds);if(rSeconds<=300)el.classList.add('warn');else el.classList.remove('warn')}
    if(rSeconds<=0){clearInterval(rTimer);rTimer=null;rDone=true;rTimeUsed='30:00';showRResult();}
  },1000);
  renderRQ();
}
function renderRQ(){
  const a=byId('randomQuiz');if(rIdx>=randQs.length||rDone){if(!rDone)showRResult();return}
  const q=getQ(randQs[rIdx]);if(!q){rIdx++;renderRQ();return}
  const warn=rSeconds<=300?' warn':'';
  a.innerHTML=`<div class="timer-bar"><div><span class="label">⏱ 剩余时间</span> <span class="time${warn}" id="rTimeDisplay">${formatTime(rSeconds)}</span></div><div class="max-score">满分：${rMaxScore}分</div></div>`+qCard(q,rIdx,randQs.length)+`<div class="nav-row"><button class="btn-prev" onclick="rPrev()" ${rIdx===0?'disabled':''}>⬅ 上一题</button><button class="btn-next" onclick="rNext()">${rIdx>=randQs.length-1?'交卷 ➡':'下一题 ➡'}</button></div><div style="text-align:center;margin-top:10px"><button onclick="clearInterval(rTimer);rTimer=null;randQs=[];rDone=false;renderRS()" style="border:none;background:none;color:var(--muted);cursor:pointer;font-size:12px">← 重新组卷</button></div>`;
}
function rPrev(){if(rIdx>0){rIdx--;renderRQ()}}function rNext(){if(rIdx<randQs.length-1){rIdx++;renderRQ()}else{clearInterval(rTimer);rTimer=null;rDone=true;rTimeUsed=formatTime(30*60-rSeconds);showRResult()}}
function showRResult(){
  clearInterval(rTimer);rTimer=null;rDone=true;
  let scTotal=0,scGot=0,tfTotal=0,tfGot=0,r=0,w=0,un=0,answered=0;
  randQs.forEach(uid=>{const q=getQ(uid);if(!q)return;if(q.type==='sc'){scTotal+=2;if(allAnswers[uid]===q.ans){scGot+=2;r++}else if(allAnswers[uid]!==undefined){w++}else{un++}}else{tfTotal+=1;if(allAnswers[uid]===q.ans){tfGot+=1;r++}else if(allAnswers[uid]!==undefined){w++}else{un++}}});answered=r+w;
  const total=scTotal+tfTotal,got=scGot+tfGot,maxSc=total;
  const usedTime=rTimeUsed||(rSeconds<=0?'30:00':formatTime(30*60-rSeconds));
  byId('randomQuiz').innerHTML=`<div class="result-card"><h2>📊 成绩报告</h2><div class="score-circle"><div class="big">${total>0?Math.round(got/total*100):0}</div><div class="sub">得分率</div></div><div style="font-size:28px;font-weight:700;margin-bottom:4px">${got} / ${maxSc} 分</div><div style="font-size:13px;color:var(--muted);margin-bottom:16px">⏱ 用时 ${usedTime} · 满分 ${maxSc}分</div><div class="score-detail"><div class="item"><div class="val" style="color:var(--accent)">${scGot}/${scTotal}</div><div class="lbl">单选(2分/题)</div></div><div class="item"><div class="val" style="color:var(--gold)">${tfGot}/${tfTotal}</div><div class="lbl">判断(1分/题)</div></div><div class="item"><div class="val" style="color:var(--green)">${r}</div><div class="lbl">✅ 正确</div></div><div class="item"><div class="val" style="color:var(--red)">${w}</div><div class="lbl">❌ 错误</div></div>${un>0?`<div class="item"><div class="val" style="color:var(--muted)">${un}</div><div class="lbl">未作答</div></div>`:''}</div><p style="color:var(--muted);font-size:13px">错题已自动加入错题本</p><button class="btn-primary" onclick="rIdx=0;rDone=false;clearInterval(rTimer);rTimer=null;randQs.forEach(u=>{delete allAnswers[u];wrongBook.delete(u)});saveAns(allAnswers);saveWB(wrongBook);updateStats();rSeconds=30*60;rTimer=setInterval(()=>{rSeconds--;const el=byId('rTimeDisplay');if(el){el.textContent=formatTime(rSeconds);if(rSeconds<=300)el.classList.add('warn');else el.classList.remove('warn')}if(rSeconds<=0){clearInterval(rTimer);rTimer=null;rDone=true;showRResult();}},1000);byId('randomQuiz').style.display='block';renderRQ()" style="padding:10px 24px;margin:8px">🔁 重新作答</button><button onclick="randQs=[];rDone=false;renderRS()" style="padding:10px 24px;border-radius:22px;border:1px solid var(--border);background:var(--card2);color:var(--text);cursor:pointer;font-size:14px;margin:8px">🔄 重新组卷</button></div>`;
}

// ── 面板4：错题本 ──
let wbOn=false,wbIdx=0,wbQs=[];
function renderWB(){wbOn=false;byId('wbPractice').style.display='none';byId('wbList').style.display='block';const arr=[...wrongBook].map(u=>getQ(u)).filter(Boolean);byId('wbCount').textContent=`${arr.length} 题`;if(!arr.length){byId('wbList').innerHTML='<div class="empty-state">📭 错题本为空</div>';return}byId('wbList').innerHTML=arr.map(q=>`<div class="wrong-item"><div class="info"><div class="q-text">${q.q}</div><div class="meta">${q.type==='sc'?'单选':'判断'} · ${q.cat}</div></div><button onclick="wbRm('${q.uid}')">✕ 移除</button></div>`).join('')}
function wbRm(u){wrongBook.delete(u);saveWB(wrongBook);updateStats();renderWB()}
function wbClear(){if(confirm('清空所有错题？')){wrongBook.clear();saveWB(wrongBook);updateStats();renderWB()}}
function wbStartPractice(){wbQs=[...wrongBook].map(u=>getQ(u)).filter(Boolean);if(!wbQs.length){alert('错题本为空！');return}wbOn=true;wbIdx=0;byId('wbList').style.display='none';byId('wbPractice').style.display='block';renderWbQ()}
function renderWbQ(){const a=byId('wbPractice');if(wbIdx>=wbQs.length){wbOn=false;byId('wbList').style.display='block';a.style.display='none';renderWB();return}a.innerHTML=qCard(wbQs[wbIdx],wbIdx,wbQs.length)+`<div class="nav-row"><button class="btn-prev" onclick="wbPrev()" ${wbIdx===0?'disabled':''}>⬅ 上一题</button><button class="btn-next" onclick="wbNext()">${wbIdx>=wbQs.length-1?'完成 ➡':'下一题 ➡'}</button></div><div style="text-align:center;margin-top:10px"><button onclick="wbOn=false;byId('wbList').style.display='block';byId('wbPractice').style.display='none';renderWB()" style="border:none;background:none;color:var(--muted);cursor:pointer;font-size:12px">← 返回列表</button></div>`;}
function wbPrev(){if(wbIdx>0){wbIdx--;renderWbQ()}}function wbNext(){if(wbIdx<wbQs.length-1){wbIdx++;renderWbQ()}else{wbOn=false;byId('wbList').style.display='block';byId('wbPractice').style.display='none';renderWB()}}
function wbShowAdd(){const h=`<div class="modal-overlay" onclick="if(event.target===this)this.remove()"><div class="modal"><h3>➕ 添加题目到错题本</h3><input class="add-search" placeholder="🔍 搜索题目..." oninput="wbSrch(this.value)"><div class="add-list" id="wbAddLst"></div><button onclick="document.querySelector('.modal-overlay').remove()" style="margin-top:10px;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card2);color:var(--text);cursor:pointer">关闭</button></div></div>`;document.body.insertAdjacentHTML('beforeend',h);wbSrch('')}
function wbSrch(t){const lst=[...Q].filter(q=>!wrongBook.has(q.uid)&&(!t||q.q.includes(t)||q.cat.includes(t))).slice(0,50);const a=byId('wbAddLst');if(!a)return;if(!lst.length){a.innerHTML='<div class="empty-state" style="padding:20px">📭 无匹配</div>';return}a.innerHTML=lst.map(q=>`<div class="add-item"><span>${q.q.substring(0,36)}... <small>(${q.cat})</small></span><button onclick="wbAdd('${q.uid}')">➕ 加入</button></div>`).join('')}
function wbAdd(u){wrongBook.add(u);saveWB(wrongBook);updateStats();const m=document.querySelector('.modal-overlay');if(m)m.remove();renderWB()}

// ── 分享 ──
function sharePage(){
  const title='AI 题库 · 多功能刷题';
  const text='405道AI/编程练习题，涵盖单选和判断，随时随地刷题！';
  const url=window.location.href;
  if(navigator.share){
    navigator.share({title,text,url}).catch(()=>copyShareLink());
  }else{
    copyShareLink();
  }
}
function copyShareLink(){
  const url=window.location.href;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>alert('链接已复制！可直接粘贴分享给好友\n\n📋 '+url)).catch(()=>alert('分享链接：\n\n📋 '+url));
  }else{
    prompt('复制此链接分享给好友：',url);
  }
}

// ── 启动 ──
renderTM();updateStats();
</script>
</body>
